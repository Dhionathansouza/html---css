<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixa</title>
    <style>
        h1 {
            /* box- level */ 
            /* display: inline*/
            background-color: lightgray;

            height: 300px;
            width: 300px;

            border:10px solid darkgray;

            padding: 10px 10px 10px 10px;

            margin: auto auto 40px auto;

            outline: 3px dashed blueviolet;


        }
        a {
            /* inline-level */
            /* display: block*/
            border-width: 10px;
            border-style: solid;
            border-color: blue;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>parágrafos também são exemplo de box-level, mas os <a href="#">são exemplos de inline-level</a>Vamos ver como isso tudo funciona.</p>
</body>
</html>
