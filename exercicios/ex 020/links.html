<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* 
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-elemento
        >  = clilden --- filho
        
        */
        body {
            background-image: linear-gradient(to right, #834283,#3D293D);
            font-family: Arial, Helvetica, sans-serif;

        }
        h1 {
            color: white;
        }
        a {
            color: rgba(211, 3, 3, 0.897);
            text-decoration: none;
            font-weight: bold;

        }
        a:visited {
            color: rgb(4, 224, 231);
        }
        a:hover {
            color: rgb(28, 1, 182);
            text-decoration: underline;
        }
        a:active {
            color: indigo;
        }
        
        .especial::before {
            content: '➾';
        }
        .especial::after {
            content: ' [link]';
            text-decoration: none;
            font-weight: normal;
            color: rgba(241, 203, 156, 0.808);
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank" class="especial">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
